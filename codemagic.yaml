workflows:
  unsigned-ios:
    name: Build Unsigned IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          cd ios && pod install
      - name: Build iOS (unsigned)
        script: flutter build ios --no-codesign --release
      - name: Pack IPA
        script: |
          rm -rf Payload
          cp -r build/ios/iphoneos/Runner.app Payload
          zip -r RePhoto.ipa Payload
          ls -lh RePhoto.ipa
    artifacts:
      - RePhoto.ipa
