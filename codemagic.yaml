workflows:
  unsigned-ios:
    name: Build Unsigned IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          cd ios && pod install
      - name: Build iOS (unsigned)
        script: flutter build ios --no-codesign --release
      - name: Package
        script: zip -r Runner.zip build/ios/iphoneos/Runner.app
    artifacts:
      - Runner.zip
